<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="dark light" />
<title>AgroCure · My Requests</title>
<script>(function(){try{var t=localStorage.getItem("agro-theme");if(!t)t=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";document.documentElement.dataset.theme=t;if(localStorage.getItem("agro-mode")==="present"&&window.innerWidth>=1024)document.documentElement.dataset.mode="present";}catch(e){document.documentElement.dataset.theme="dark";}})();</script>
<style>
  :root{
    --bg:#05130d; --surface:#0c1d15; --surface-2:#091711; --surface-hi:#102a1e;
    --glass-line:rgba(120,210,165,.16); --line:#1d3c2d;
    --ink:#edfaf2; --ink-2:#c4ddd0; --muted:#8fb3a2;
    --accent:#34d399; --accent-2:#10b981; --accent-deep:#059669; --accent-ink:#03130c;
    --lime:#a3e635; --mint:#6ee7b7;
    --danger:#fb9b9b; --warn:#fcc44d; --info:#7cc4ff;
    --r-sm:12px; --r-md:16px; --r-lg:22px; --r-pill:999px;
    --ease-out:cubic-bezier(.23,1,.32,1); --spring:cubic-bezier(.34,1.56,.64,1);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --shadow:0 28px 80px -34px rgba(0,0,0,.9);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100dvh;line-height:1.55;
    -webkit-font-smoothing:antialiased;
    padding:max(18px,env(safe-area-inset-top)) 16px calc(60px + env(safe-area-inset-bottom))}
  .wrap{max-width:680px;margin:0 auto}
  a{color:var(--accent);text-decoration:none}
  :focus-visible{outline:2px solid var(--lime);outline-offset:2px;border-radius:8px}
  button{font-family:inherit}

  header{display:flex;align-items:center;gap:13px;margin-bottom:6px}
  .logo{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;color:var(--accent-ink);
    background:linear-gradient(150deg,var(--lime),var(--accent),var(--accent-deep));flex-shrink:0}
  .logo svg{width:25px;height:25px}
  h1{font-size:1.28rem;font-weight:750;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:.83rem}
  .nav{margin:10px 0 22px;font-size:.84rem}

  .rq{display:grid;grid-template-columns:88px 1fr;gap:14px;align-items:stretch;
    background:linear-gradient(180deg,var(--surface),var(--surface-2));border:1px solid var(--glass-line);
    border-radius:var(--r-lg);padding:14px;margin-bottom:14px;box-shadow:var(--shadow);
    animation:rise .45s var(--ease-out) both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .rq-img{width:88px;height:88px;border-radius:var(--r-md);object-fit:cover;border:1px solid var(--line);
    background:var(--surface-hi);cursor:zoom-in;transition:transform .2s var(--ease-out)}
  .rq-img:hover{transform:scale(1.03)}
  .rq-img.ph{display:grid;place-items:center;color:var(--muted);cursor:default}
  .rq-body{min-width:0;display:flex;flex-direction:column;gap:6px}
  .rq-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .rq-date{color:var(--muted);font-size:.76rem;margin-left:auto;white-space:nowrap}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:700;
    padding:4px 11px;border-radius:var(--r-pill);white-space:nowrap}
  .badge svg{width:12px;height:12px}
  .badge .spin{animation:spin 1.4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .badge.prog{background:rgba(124,196,255,.12);border:1px solid rgba(124,196,255,.35);color:var(--info)}
  .badge.warn{background:rgba(252,196,77,.12);border:1px solid rgba(252,196,77,.4);color:var(--warn)}
  .badge.done{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.35);color:var(--accent)}
  .badge.bad{background:rgba(251,155,155,.1);border:1px solid rgba(251,155,155,.3);color:var(--danger)}
  .dx{font-size:.9rem}
  .dx .k{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
  .dx .ai{color:var(--ink);font-weight:650}
  .dx .exp{color:var(--accent);font-weight:700}
  .dx-row{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}

  .empty{text-align:center;padding:70px 16px;color:var(--muted)}
  .empty .glyph{width:66px;height:66px;border-radius:19px;display:grid;place-items:center;margin:0 auto 16px;
    background:var(--surface);border:1px solid var(--line);color:var(--accent);animation:float 4s var(--ease-out) infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .empty .glyph svg{width:32px;height:32px}
  .empty h2{color:var(--ink);font-size:1.1rem;font-weight:700;margin-bottom:6px}
  .empty .cta{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:12px 20px;border-radius:var(--r-md);
    background:linear-gradient(150deg,var(--lime),var(--accent-deep));color:var(--accent-ink);font-weight:750}

  .clearbtn{margin:4px auto 0;display:block;background:none;border:1px solid var(--line);color:var(--muted);
    font-size:.78rem;padding:8px 16px;border-radius:var(--r-pill);cursor:pointer;transition:border-color .2s,color .2s}
  .clearbtn:hover{border-color:var(--danger);color:var(--danger)}

  .lightbox{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
    background:rgba(3,10,7,.86);backdrop-filter:blur(6px);padding:24px;cursor:zoom-out}
  .lightbox.show{display:flex}
  .lightbox img{max-width:92vw;max-height:92vh;border-radius:14px;border:1px solid var(--glass-line)}
</style>
<link rel="stylesheet" href="/static/agro-ui.css" />
<script src="/static/agro-ui.js" defer></script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 4 13C4 7 9 3 20 3c0 11-4 16-9 16Z"/><path d="M4 21c2-5 5-8 9-10"/></svg></div>
    <div><h1>My Requests</h1><div class="sub">Every leaf you've checked, and where it stands</div></div>
    <div class="ui-controls" style="margin-left:auto">
      <button class="icon-btn" type="button" data-theme-toggle aria-label="Toggle theme"></button>
      <button class="icon-btn mode-toggle" type="button" data-mode-toggle aria-label="Presentation mode"></button>
    </div>
  </header>
  <div class="nav"><a href="/app">← Back to AgroCure</a></div>
  <div id="list"></div>
</div>
<div class="lightbox" id="lightbox"><img id="lbImg" alt="request image" /></div>

<script>
const $ = s => document.querySelector(s);
const HKEY = "agro-requests";
const load = () => { try{ return JSON.parse(localStorage.getItem(HKEY)) || []; }catch(e){ return []; } };
const save = a => { try{ localStorage.setItem(HKEY, JSON.stringify(a)); }catch(e){} };

const lb = $("#lightbox"), lbImg = $("#lbImg");
lb.addEventListener("click", () => lb.classList.remove("show"));
document.addEventListener("keydown", e => { if (e.key === "Escape") lb.classList.remove("show"); });

function when(ts){
  const d = new Date(ts), now = Date.now(), diff = (now - ts) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff/60) + " min ago";
  if (diff < 86400) return Math.floor(diff/3600) + "h ago";
  return d.toLocaleDateString(undefined, {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"});
}

// Map a stored status (+ any live expert state) to a badge.
function badge(status){
  const s = (status || "").toLowerCase();
  if (s === "reviewed") return {cls:"done", t:"Reviewed", ic:'<path d="M20 6 9 17l-5-5"/>'};
  if (s === "diagnosed") return {cls:"done", t:"Diagnosed", ic:'<path d="M20 6 9 17l-5-5"/>'};
  if (s === "under review") return {cls:"prog", t:"Under review", spin:true, ic:'<path d="M21 12a9 9 0 1 1-6.2-8.5"/>'};
  if (s === "diagnosing") return {cls:"prog", t:"Diagnosing", spin:true, ic:'<path d="M21 12a9 9 0 1 1-6.2-8.5"/>'};
  if (s === "sent to expert" || s === "pending review") return {cls:"warn", t:"Pending review", ic:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'};
  if (s === "no leaf detected") return {cls:"bad", t:"No leaf detected", ic:'<circle cx="12" cy="12" r="9"/><path d="m15 9-6 6M9 9l6 6"/>'};
  return {cls:"prog", t:status || "Pending", ic:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'};
}

function render(){
  const items = load();
  const list = $("#list");
  if (!items.length){
    list.innerHTML = `<div class="empty">
      <span class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.5"/></svg></span>
      <h2>No requests yet</h2>
      <p>Leaves you analyze will appear here with their live status.</p>
      <a class="cta" href="/app"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.5"/></svg> Analyze a leaf</a>
    </div>`;
    return;
  }
  list.innerHTML = items.map((r, i) => {
    const b = badge(r.status);
    const img = r.thumb
      ? `<img class="rq-img" src="${r.thumb}" data-full="${r.thumb}" alt="leaf" />`
      : `<div class="rq-img ph"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="m21 15-5-5L5 21"/></svg></div>`;
    const ai = r.ai ? `<div class="dx-row"><span class="k">Sage / AI</span><span class="ai">${esc(r.ai)}</span></div>` : "";
    const exp = r.expert ? `<div class="dx-row"><span class="k">Expert</span><span class="exp">${esc(r.expert)}</span></div>` : "";
    return `<div class="rq" data-i="${i}">
      ${img}
      <div class="rq-body">
        <div class="rq-top">
          <span class="badge ${b.cls}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="${b.spin?'spin':''}">${b.ic}</svg>${b.t}</span>
          <span class="rq-date">${when(r.date)}</span>
        </div>
        <div class="dx">${ai}${exp}</div>
      </div>
    </div>`;
  }).join("") + `<button class="clearbtn" id="clear">Clear history</button>`;

  list.querySelectorAll(".rq-img[data-full]").forEach(im =>
    im.addEventListener("click", () => { lbImg.src = im.dataset.full; lb.classList.add("show"); }));
  const c = $("#clear"); if (c) c.addEventListener("click", () => { if (confirm("Clear all request history on this device?")){ save([]); render(); } });
}
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

// Live-refresh any case that's with an expert.
async function refreshExpertCases(){
  const items = load(); let changed = false;
  await Promise.all(items.map(async r => {
    if (!r.review_id || (r.status||"").toLowerCase() === "reviewed") return;
    try{
      const s = await fetch(`/api/review-status?id=${encodeURIComponent(r.review_id)}`).then(x => x.json());
      if (!s || !s.status || s.status === "unknown") return;
      if (s.status === "reviewing" && r.status !== "Under review"){ r.status = "Under review"; changed = true; }
      else if (s.status === "pending" && r.status !== "Pending review"){ r.status = "Pending review"; changed = true; }
      else if (s.status === "reviewed"){
        const lbl = (s.expert_disease && s.expert_disease.toLowerCase() !== "healthy")
          ? `${s.expert_plant} — ${s.expert_disease}` : (s.expert_plant || "Reviewed");
        r.status = "Reviewed"; r.expert = lbl; changed = true;
      }
    }catch(e){}
  }));
  if (changed){ save(items); render(); }
}

render();
refreshExpertCases();
setInterval(refreshExpertCases, 8000);
</script>
</body>
</html>
